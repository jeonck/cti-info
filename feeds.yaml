# 수집 소스 정의 — context.md의 관심사(CVE/취약점, CTI 구조화·상호운용성, TTP·위협행위자 동향)에 맞춤
# URL은 2026-07-09 기준 HTTP 200 확인됨 (pipeline UA 기준)

rss:
  # 종합 보안 뉴스
  - name: "The Hacker News"
    url: "https://feeds.feedburner.com/TheHackersNews"
  - name: "BleepingComputer"
    url: "https://www.bleepingcomputer.com/feed/"
  - name: "Krebs on Security"
    url: "https://krebsonsecurity.com/feed/"
  # CVE / 취약점·익스플로잇
  - name: "SANS Internet Storm Center"
    url: "https://isc.sans.edu/rssfeed_full.xml"
  - name: "Exploit-DB"
    url: "https://www.exploit-db.com/rss.xml"
  - name: "CISA Cybersecurity Advisories"
    url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
  - name: "Rapid7 Blog"
    url: "https://www.rapid7.com/blog/rss/"
  # 위협 인텔리전스 / TTP / 위협 행위자 동향
  - name: "Unit42 (Palo Alto)"
    url: "https://unit42.paloaltonetworks.com/feed/"
  - name: "Mandiant Blog"
    url: "https://www.mandiant.com/resources/blog/rss.xml"
  - name: "Talos Intelligence"
    url: "https://blog.talosintelligence.com/rss/"
  - name: "CrowdStrike Blog"
    url: "https://www.crowdstrike.com/blog/feed/"
  - name: "WeLiveSecurity (ESET)"
    url: "https://www.welivesecurity.com/en/rss/feed/"
  - name: "Microsoft Security Blog"
    url: "https://www.microsoft.com/en-us/security/blog/feed/"

reddit:
  - subreddit: "netsec"
    listing: "top"
    t: "day"
    min_score: 20
  - subreddit: "blueteamsec"
    listing: "top"
    t: "day"
    min_score: 10
  - subreddit: "Malware"
    listing: "top"
    t: "day"
    min_score: 10

hackernews:
  # hnrss.org 사용: https://hnrss.org/newest?q=QUERY&points=N
  - query: "CVE"
    min_points: 50
  - query: "ransomware"
    min_points: 80
  - query: "threat intelligence"
    min_points: 30
  - query: "zero-day"
    min_points: 50

# 주의: created:>N일 조건이라 임계값이 높으면 0건이 됨 (검증: >100/7일=0건, >50/14일=수 건)
github_search:
  - query: "topic:threat-intelligence stars:>20"
    days_back: 14
  - query: "topic:malware-analysis stars:>20"
    days_back: 14
  - query: "topic:stix2 stars:>5"
    days_back: 30
